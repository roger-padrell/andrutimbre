#include <Wire.h>
#include "RTClib.h"
#include "SoftwareSerial.h"
#include "DFRobotDFPlayerMini.h"

// ================== RTC ==================
RTC_DS3231 rtc;

// ================== MP3 ==================
SoftwareSerial mySerial(2, 3); // RX, TX
DFRobotDFPlayerMini myDFPlayer;

/*
  _    _  ____  _____            _____  _____ 
 | |  | |/ __ \|  __ \     /\   |  __ \|_   _|
 | |__| | |  | | |__) |   /  \  | |__) | | |  
 |  __  | |  | |  _  /   / /\ \ |  _  /  | |  
 | |  | | |__| | | \ \  / ____ \| | \ \ _| |_ 
 |_|  |_|\____/|_|  \_\/_/    \_\_|  \_\_____|
*/
uint8_t bellSchedule[7][12][2] = {
  { {255,255} }, // Diumenge
  { {7, 30}, {255,255} },
  { {7, 30}, {255,255} },
  { {7, 30}, {255,255} },
  { {7, 30}, {255,255} },
  { {7, 30}, {8, 30}, {255,255} },
  { {255,255} }  // Dissabte
};

bool music_working = false;

int lastPlayedMinute = -1;
int lastPlayedDay    = -1;

// ================== DST HELPERS ==================

bool isLastSunday(int year, int month, int day) {
  DateTime d(year, month, day);
  if (d.dayOfTheWeek() != 0) return false;
  DateTime nextWeek = d + TimeSpan(7, 0, 0, 0);
  return nextWeek.month() != month;
}

bool isDSTSpain(DateTime utc) {
  int year = utc.year();

  DateTime marchEnd, octoberEnd;

  for (int d = 31; d >= 25; d--) {
    if (isLastSunday(year, 3, d)) {
      marchEnd = DateTime(year, 3, d, 1, 0, 0);
      break;
    }
  }

  for (int d = 31; d >= 25; d--) {
    if (isLastSunday(year, 10, d)) {
      octoberEnd = DateTime(year, 10, d, 1, 0, 0);
      break;
    }
  }

  return (utc >= marchEnd && utc < octoberEnd);
}

// ================== SERIAL COMMANDS ==================

void handleSerialCommands() {
  if (!Serial.available()) return;

  String cmd = Serial.readStringUntil('\n');
  cmd.trim();

  // ---- SET TIME ----
  if (cmd.startsWith("TIME_")) {
    long unixTime = cmd.substring(5).toInt();
    if (unixTime < 100000) return;

    DateTime utc(unixTime);
    int offset = isDSTSpain(utc) ? 2 : 1;
    DateTime local = utc + TimeSpan(0, offset, 0, 0);

    rtc.adjust(local);

    Serial.print("OK TIME SET TO ");
    Serial.println(local.timestamp());
  }

  else if(cmd == "HELLO") {
    Serial.println("OLLEH");
  }

  else if(cmd.startsWith("UPDATE")){
    updateSchedule(cmd);
  }

  else if(cmd == "GET") {
    Serial.println(stringifyBellSchedule());
  }

  // ---- ASK TIME ----
  else if (cmd == "ASK_TIME") {
    DateTime now = rtc.now();

    Serial.print("TIME_");
    Serial.print(now.year());  Serial.print("-");
    if (now.month() < 10) Serial.print("0");
    Serial.print(now.month()); Serial.print("-");
    if (now.day() < 10) Serial.print("0");
    Serial.print(now.day());   Serial.print(" ");
    if (now.hour() < 10) Serial.print("0");
    Serial.print(now.hour());  Serial.print(":");
    if (now.minute() < 10) Serial.print("0");
    Serial.print(now.minute());Serial.print(":");
    if (now.second() < 10) Serial.print("0");
    Serial.println(now.second());
  }
}

void play_if_possible() {
  if(music_working){
    myDFPlayer.randomAll();
  }
}

// ================== SETUP ==================

void setup() {
  Wire.begin();
  rtc.begin();

  Serial.begin(9600);

  mySerial.begin(9600); // Communication with DFPlayer
  if (!myDFPlayer.begin(mySerial)) {
    Serial.println("Unable to begin. Check connections!");
    music_working = false;
  }
  else{
    music_working = true;
    Serial.println("DFPlayer Mini ready!");
    myDFPlayer.volume(30);
  }
}

// ================== LOOP ==================

void loop() {
  handleSerialCommands();

  DateTime now = rtc.now();

  int weekday = now.dayOfTheWeek();
  int hour    = now.hour();
  int minute  = now.minute();

  if (minute == lastPlayedMinute && weekday == lastPlayedDay) {
    delay(1000);
    return;
  }

  for (int i = 0; i < 12; i++) {
    if (bellSchedule[weekday][i][0] == 255) break;

    if (bellSchedule[weekday][i][0] == hour &&
        bellSchedule[weekday][i][1] == minute) {

      play_if_possible();

      Serial.println("Alarm playing");

      lastPlayedMinute = minute;
      lastPlayedDay    = weekday;
      break;
    }
  }

  delay(1000);
}

void updateSchedule(String input) {
  // Check if the string starts with the command
  if (!input.startsWith("UPDATE")) return;

  int charIndex = 0;
  const char* ptr = input.c_str();

  // Iterate through the 3D array dimensions
  for (int day = 0; day < 7; day++) {
    for (int slot = 0; slot < 12; slot++) {
      for (int val = 0; val < 2; val++) {
        
        // Find the next digit in the string
        while (ptr[charIndex] != '\0' && !isdigit(ptr[charIndex])) {
          charIndex++;
        }

        // If we haven't reached the end of the string, parse the number
        if (ptr[charIndex] != '\0') {
          char* endPtr;
          // strtol converts the string to a number and tells us where it stopped
          bellSchedule[day][slot][val] = (uint8_t)strtol(&ptr[charIndex], &endPtr, 10);
          
          // Move the index forward to where the number ended
          charIndex = endPtr - ptr;
        }
      }
    }
  }
  Serial.println("Schedule updated successfully!");
}

String stringifyBellSchedule() {
    String result = "UPDATE {{";
    
    for (int i = 0; i < 7; i++) {
        result += "{";
        for (int j = 0; j < 12; j++) {
            result += "{" + String(bellSchedule[i][j][0]) + "," + String(bellSchedule[i][j][1]) + "}";
            if (j < 11) result += ",";
        }
        result += "}";
        if (i < 6) result += ",";
    }
    
    result += "}}";
    return result;
}
